<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

h1 {
  text-align: center;
}

.cart-container {
  max-width: 800px;
  margin: auto;
}

.item {
  background: white;
  padding: 15px;
  margin: 10px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.item img {
  width: 80px;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🛒 Your Cart</h1>

<div class="cart-container" id="cartContainer"></div>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cartContainer");

// 🔥 Render cart
function renderCart() {
  container.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    if (!item.quantity) item.quantity = 1;

    total += parseInt(item.price.replace("₹","")) * item.quantity;

    const div = document.createElement("div");
    div.classList.add("item");

    div.innerHTML = `
      <img src="${item.image}">
      <h3>${item.name}</h3>
      <p>₹${parseInt(item.price.replace("₹","")) * item.quantity}</p>

      <div>
        <button onclick="decrease(${index})">-</button>
        ${item.quantity}
        <button onclick="increase(${index})">+</button>
      </div>

      <button onclick="removeItem(${index})">Remove</button>
    `;

    container.appendChild(div);
  });

  // 🔥 Total price
  const totalDiv = document.createElement("h2");
  totalDiv.innerText = "Total: ₹" + total;
  container.appendChild(totalDiv);

  localStorage.setItem("cart", JSON.stringify(cart));
}

// ➕ Increase quantity
function increase(index) {
  cart[index].quantity++;
  renderCart();
}

// ➖ Decrease quantity
function decrease(index) {
  if (cart[index].quantity > 1) {
    cart[index].quantity--;
  }
  renderCart();
}

// ❌ Remove item
function removeItem(index) {
  cart.splice(index, 1);
  renderCart();
}

renderCart();
</script>

</body>
</html>
