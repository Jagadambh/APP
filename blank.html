<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popup Demo</title>
  <style>
    .hidden { display: none; }

    .modal {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex; justify-content: center; align-items: center;
      z-index: 999;
    }

    .modal-content {
      background: #fff;
      padding: 20px;
      width: 90%; max-width: 400px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px black;
    }

    .close {
      float: right; font-size: 24px;
      color: red; cursor: pointer;
    }

    img.product {
      width: 150px;
      cursor: pointer;
      margin: 10px;
    }
  </style>
</head>
<body>

<!-- Clickable Image -->
<img src="https://via.placeholder.com/150" class="product" onclick="showPopup(
  'Agarbatti',
  'Premium incense sticks used for rituals.',
  'https://via.placeholder.com/300')">

<!-- Modal -->
<div id="popup" class="modal hidden">
  <div class="modal-content">
    <span class="close" onclick="hidePopup()">&times;</span>
    <h2 id="popup-title"></h2>
    <img id="popup-image" src="" style="max-width: 100%; height: auto;">
    <p id="popup-desc"></p>
  </div>
</div>

<script>
  function showPopup(title, desc, imageUrl) {
    document.getElementById('popup-title').innerText = title;
    document.getElementById('popup-desc').innerText = desc;
    document.getElementById('popup-image').src = imageUrl;
    document.getElementById('popup').classList.remove('hidden');
  }

  function hidePopup() {
    document.getElementById('popup').classList.add('hidden');
  }
</script>

</body>
</html>
